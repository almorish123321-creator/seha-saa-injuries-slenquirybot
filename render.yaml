services:
  - type: web
    name: seha-medical-system
    env: python
    # أمر البناء لتثبيت كافة المكتبات المطلوبة
    buildCommand: pip install -r requirements.txt
    # الأمر السحري لتشغيل البوت في الخلفية والموقع في الواجهة
    startCommand: python bot/bot.py & gunicorn src.main:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
